; Kit Pedagogique CO2 - PlatformIO Configuration
; ================================================
; Projet pour Raspberry Pi Pico W + SensAir S88 + OLED 0.96"
;
; Commandes utiles:
;   pio run            - Compiler
;   pio run -t upload  - Compiler et uploader
;   pio device monitor - Voir les logs serie

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

; Upload
upload_protocol = picotool
upload_port = /dev/cu.usbmodem313301

; Vitesse du port série pour le debug
monitor_speed = 115200

; Librairies
lib_deps =
    ; Ecran OLED SSD1306
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.4.1

; Flags de compilation
build_flags =
    -DPICO_BUILD=1
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_BLUETOOTH=1
