; Kit Pedagogique CO2 - PlatformIO Configuration
; ================================================
; Projet simple pour ESP32 + SensAir S88 + OLED 0.96"
;
; Commandes utiles:
;   pio run            - Compiler
;   pio run -t upload  - Compiler et uploader
;   pio device monitor - Voir les logs serie

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Partition avec plus de place pour le BLE (3MB app, pas de SPIFFS)
board_build.partitions = huge_app.csv

; Vitesse du port série pour le debug
monitor_speed = 115200

; Librairies
lib_deps =
    ; Ecran OLED SSD1306
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.4.1

; Flags de compilation
build_flags =
    -DCORE_DEBUG_LEVEL=0
